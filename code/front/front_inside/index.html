<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CogniWake</title>
  <link rel="stylesheet" href="../style/screen.css">
  <script src="../script/app.js"></script>
</head>
<body class="inside-frontend">
  <div class="sidebar">
    <div class="weather-left">
      <div id="weather-city">--</div>
      <div id="weather-wind">--</div>
    </div>
    <div class="nav">
      <a  href="#" class="nav-home active">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg"            width="24" height="24" viewBox="0 0 24 24"
            fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/>
            <path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
      </a>
      <a href="#" class="nav-alarms">
        <svg xmlns="http://www.w3.org/2000/svg"
          width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="12" cy="13" r="8"/>
          <path d="M12 9v4l2 2"/>
          <path d="M5 3 2 6"/>
          <path d="m22 6-3-3"/>
          <path d="M6.38 18.7 4 21"/>
          <path d="M17.64 18.67 20 21"/>
        </svg>
      </a>
      <a href="#" class="nav-settings">
        <svg xmlns="http://www.w3.org/2000/svg"
          width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/>
          <circle cx="12" cy="12" r="3"/>
          </svg>
        </a>
      </div>
      <div class="weather-right">
        <div id="weather-code">--</div>
        <div id="weather-temp">--</div>
      </div>
    </div>
    

  <div class="content">
    <div id="home-screen" class="screen screen-visible">
        <div class="top-row">
              <div class="clock" id="clock">00:00</div>
        </div>
    </div>
    <div id="alarms-screen" class="screen">
    </div>
    <div id="settings-screen" class="screen">
      <div class="settings-box">
        <div class="settings-item">
          <h3>Network</h3>
          <div id="inside-network-summary">
            Loading
          </div>
          <button id="inside-network-settings">
            Configure
          </button>
        </div>
      </div>
      <div class="settings-box">
        <div class="settings-item">
          <h3>Time</h3>
          <div id="inside-time-summary-value">Loading</div>
          <button id="inside-time-settings">
            Configure
          </button>
        </div>
      </div>
      <div class="settings-box">
        <div class="settings-item">
          <h3>Weather</h3>
          <div id="inside-weather-value">Loading</div>
          <button id="inside-weather-settings">
            Configure
          </button>
        </div>
      </div> 
      <div class="settings-box">
        <div class="settings-item">
          <h3>Power off</h3>
          <div >POWER OFF DEVICE</div>
          <button id="inside-poweroff">
            Power off
          </button>
        </div>
      </div>
      <div class="settings-box">
        <div class="settings-item">
          <h3>Reboot</h3>
          <div>REBOOT DEVICE</div>
          <button id="inside-reboot">
            REBOOT
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
