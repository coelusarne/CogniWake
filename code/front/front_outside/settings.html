<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <link rel="stylesheet" href="../style/screen.css ">
  <script src="../script/app.js"></script>
</head>
<body>
  <div class="sidebar">
    <div class="logo">CogniWake</div>
    <div class="nav">
      <a href="index.html">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg"
          width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/>
          <path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
        <span>Dashboard</span>
      </a>
      <a href="alarms.html">
          <svg xmlns="http://www.w3.org/2000/svg" 
            width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-alarm-clock-icon lucide-alarm-clock"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3 2 6"/><path d="m22 6-3-3"/><path d="M6.38 18.7 4 21"/><path d="M17.64 18.67 20 21"/>
          </svg>
          <span>Alarms</span>
      </a>
      <a href="settings.html" class="active">
        <svg xmlns="http://www.w3.org/2000/svg" 
          width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings-icon lucide-settings"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/>
        </svg>
        <span>Settings</span>
      </a>
      <a href="logs.html">
        <svg xmlns="http://www.w3.org/2000/svg" 
          width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-scroll-text-icon lucide-scroll-text"><path d="M15 12h-5"/><path d="M15 8h-5"/><path d="M19 17V5a2 2 0 0 0-2-2H4"/><path d="M8 21h12a2 2 0 0 0 2-2v-1a1 1 0 0 0-1-1H11a1 1 0 0 0-1 1v1a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v2a1 1 0 0 0 1 1h3"/>
        </svg>
        <span>Logs</span>
      </a>
    </div>
  </div>

  <div class="content">
    <div class="settings-layout">
      <div class="settings-left">
        <div class="settings-box">
          <h3>Device</h3>

          <div class="settings-item">
            <span>Theme color</span>
            <div class="theme-picker-wrapper">
              <input type="color" id="theme-picker" value="#7c3aed">
              <button id="theme-save-button">Apply</button>
        </div>
</div>
          <div class="settings-item">
            <span>Network Settings</span>
            <button onclick="openNetworkSettings()">Open</button>
          </div>

          <div class="settings-item">
            <span>Time settings</span>
            <button onclick="openTimeSettings()">Open</button>
          </div>
          <div class="settings-item">
            <span>Username</span>
            <input id="name-input" type="text">
            <button id="username-save-button">
              Apply
            </button>
          </div>
          <div class="settings-item">
            <span>Weather API settings</span>
            <button onclick="openWeatherSettings()">Open</button>
          </div>
        </div>

        <div class="settings-box">
          <h3>Data</h3>

          <div class="settings-item">
            <span>Clear history</span>
            <button onclick="clearHistory()">Clear</button>
          </div>

          <div class="settings-item">
            <span>Clear alarms</span>
            <button onclick="clearAlarms()">Clear</button>
          </div>

          <div class="settings-item">
            <span>Clear logs</span>
            <button onclick="clearLogs()">Clear</button>
          </div>
        </div>
      </div>

      <div class="settings-box hardware-box">
        <h3>Hardware tests</h3>

        <div class="settings-item">
          <span>MPU6050</span>
          <button onclick="runHardwareTest('mpu6050', true)">Test</button>
        </div>

        <div class="settings-item">
          <span>RCWL-0516</span>
          <button onclick="runHardwareTest('rcwl0516', true)">Test</button>
        </div>

        <div class="settings-item">
          <span>Keypad</span>
          <button onclick="runHardwareTest('keypad', true)">Test</button>
        </div>

        <div class="settings-item">
          <span>Buzzer</span>
          <button onclick="runHardwareTest('buzzer')">Test</button>
        </div>

        <div class="settings-item">
          <span>Vibration motor</span>
          <button onclick="runHardwareTest('motor')">Test</button>
        </div>

        <div class="settings-item">
          <span>Turn off device</span>
          <button onclick="PowerOffDevice()">Off</button>
        </div>

        <div class="settings-item">
          <span>Reboot device</span>
          <button onclick="rebootDevice()">Reboot</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
