<VirtualHost *:80>

    DocumentRoot /home/student/CogniWake/front

    <Directory /home/student/CogniWake/front>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ProxyPreserveHost On

    ProxyPass /api/v1/hardware/ ws://127.0.0.1:5000/api/v1/hardware/
    ProxyPassReverse /api/v1/hardware/ ws://127.0.0.1:5000/api/v1/hardware/

    ProxyPass /api/v1/settings/ws ws://127.0.0.1:5000/api/v1/settings/ws
    ProxyPassReverse /api/v1/settings/ws ws://127.0.0.1:5000/api/v1/settings/ws

    ProxyPass /api/v1/alarms/live ws://127.0.0.1:5000/api/v1/alarms/live
    ProxyPassReverse /api/v1/alarms/live ws://127.0.0.1:5000/api/v1/alarms/live

    ProxyPass /api http://127.0.0.1:5000/api
    ProxyPassReverse /api http://127.0.0.1:5000/api

</VirtualHost>



